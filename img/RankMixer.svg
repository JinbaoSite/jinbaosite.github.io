<svg width="900" height="1180" viewBox="0 0 900 1180" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="1180" fill="#FFFFFF"/>

  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#26215C">RankMixer 整体架构</text>

  <!-- ===== 1. Input feature groups ===== -->
  <g>
    <rect x="45" y="60" width="190" height="66" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <text x="140" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">用户画像</text>
    <text x="140" y="106" text-anchor="middle" font-size="11" fill="#185FA5">User Profiles</text>

    <rect x="255" y="60" width="190" height="66" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <text x="350" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">视频特征</text>
    <text x="350" y="106" text-anchor="middle" font-size="11" fill="#185FA5">Video Features</text>

    <rect x="465" y="60" width="190" height="66" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <text x="560" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">序列特征</text>
    <text x="560" y="106" text-anchor="middle" font-size="11" fill="#185FA5">Sequence Features</text>

    <rect x="675" y="60" width="190" height="66" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <text x="770" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">交叉特征</text>
    <text x="770" y="106" text-anchor="middle" font-size="11" fill="#185FA5">Interacted Features</text>
  </g>

  <!-- arrows down to embedding bar -->
  <line x1="140" y1="126" x2="140" y2="158" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="126" x2="350" y2="158" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="126" x2="560" y2="158" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="126" x2="770" y2="158" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 2. Embedding bar ===== -->
  <rect x="40" y="160" width="820" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="450" y="190" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">数百个特征 Embedding（维度各不相同）</text>

  <line x1="450" y1="210" x2="450" y2="240" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 3. Tokenization ===== -->
  <rect x="230" y="242" width="440" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="450" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">Tokenization（特征 Token 化）</text>
  <text x="450" y="286" text-anchor="middle" font-size="11" fill="#3C3489">语义分组 → 拼接 → 等距切分 → Proj 投影对齐维度 D</text>

  <line x1="450" y1="302" x2="450" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 4. Token row ===== -->
  <g font-size="12" fill="#3C3489">
    <rect x="99"  y="332" width="90" height="46" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
    <text x="144" y="360" text-anchor="middle" font-weight="600">x1</text>
    <rect x="201" y="332" width="90" height="46" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
    <text x="246" y="360" text-anchor="middle" font-weight="600">x2</text>
    <rect x="303" y="332" width="90" height="46" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
    <text x="348" y="360" text-anchor="middle" font-weight="600">x3</text>
    <rect x="405" y="332" width="90" height="46" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
    <text x="450" y="360" text-anchor="middle" font-weight="600">x4</text>
    <text x="552" y="360" text-anchor="middle" font-weight="600" font-size="16">…</text>
    <rect x="603" y="332" width="90" height="46" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
    <text x="648" y="360" text-anchor="middle" font-weight="600">x_T-1</text>
    <rect x="705" y="332" width="90" height="46" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
    <text x="750" y="360" text-anchor="middle" font-weight="600">x_T</text>
  </g>
  <text x="450" y="392" text-anchor="middle" font-size="11" fill="#5F5E5A">T 个 Token，每个维度 D（论文：100M配置 T=16, D=768；1B配置 T=32, D=1536）</text>

  <line x1="450" y1="402" x2="450" y2="428" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 5. RankMixer Block container ===== -->
  <rect x="55" y="430" width="790" height="630" rx="14" fill="none" stroke="#639922" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="80" y="456" font-size="14" font-weight="600" fill="#27500A">RankMixer Block（重复 × L 层）</text>

  <!-- 5a. Token Mixing box -->
  <rect x="90" y="468" width="720" height="252" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="450" y="492" text-anchor="middle" font-size="14" font-weight="600" fill="#633806">Multi-Head Token Mixing（无参数算子）</text>
  <text x="450" y="510" text-anchor="middle" font-size="11" fill="#854F0B">SplitHead → 按 head 位置跨 Token 拼接 → 生成新 Token</text>

  <!-- token labels -->
  <text x="210" y="524" text-anchor="middle" font-size="11" fill="#854F0B">x1</text>
  <text x="370" y="524" text-anchor="middle" font-size="11" fill="#854F0B">x2</text>
  <text x="530" y="524" text-anchor="middle" font-size="11" fill="#854F0B">x3</text>
  <text x="690" y="524" text-anchor="middle" font-size="11" fill="#854F0B">x4</text>

  <!-- 4 token bars split into 3 heads each -->
  <g stroke="#FFFFFF" stroke-width="1">
    <rect x="180" y="530" width="60" height="30" fill="#378ADD"/>
    <rect x="180" y="560" width="60" height="30" fill="#1D9E75"/>
    <rect x="180" y="590" width="60" height="30" fill="#EF9F27"/>

    <rect x="340" y="530" width="60" height="30" fill="#378ADD"/>
    <rect x="340" y="560" width="60" height="30" fill="#1D9E75"/>
    <rect x="340" y="590" width="60" height="30" fill="#EF9F27"/>

    <rect x="500" y="530" width="60" height="30" fill="#378ADD"/>
    <rect x="500" y="560" width="60" height="30" fill="#1D9E75"/>
    <rect x="500" y="590" width="60" height="30" fill="#EF9F27"/>

    <rect x="660" y="530" width="60" height="30" fill="#378ADD"/>
    <rect x="660" y="560" width="60" height="30" fill="#1D9E75"/>
    <rect x="660" y="590" width="60" height="30" fill="#EF9F27"/>
  </g>
  <g fill="none" stroke="#412402" stroke-width="0.5">
    <rect x="180" y="530" width="60" height="90"/>
    <rect x="340" y="530" width="60" height="90"/>
    <rect x="500" y="530" width="60" height="90"/>
    <rect x="660" y="530" width="60" height="90"/>
  </g>

  <!-- ticks connecting bars to bracket -->
  <g stroke="#888780" stroke-width="1">
    <line x1="210" y1="620" x2="210" y2="634"/>
    <line x1="370" y1="620" x2="370" y2="634"/>
    <line x1="530" y1="620" x2="530" y2="634"/>
    <line x1="690" y1="620" x2="690" y2="634"/>
  </g>
  <line x1="180" y1="634" x2="720" y2="634" stroke="#888780" stroke-width="1"/>
  <line x1="450" y1="634" x2="450" y2="650" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="646" text-anchor="middle" font-size="10" fill="#5F5E5A">跨 Token 按 head 位置重组</text>

  <!-- mixed tokens s1 s2 s3 -->
  <rect x="195" y="656" width="150" height="42" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <text x="270" y="674" text-anchor="middle" font-size="12" font-weight="600" fill="#0C447C">s¹</text>
  <text x="270" y="690" text-anchor="middle" font-size="10" fill="#185FA5">head1 跨 Token 拼接</text>

  <rect x="375" y="656" width="150" height="42" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="450" y="674" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">s²</text>
  <text x="450" y="690" text-anchor="middle" font-size="10" fill="#0F6E56">head2 跨 Token 拼接</text>

  <rect x="555" y="656" width="150" height="42" rx="6" fill="#FAC775" stroke="#854F0B" stroke-width="1"/>
  <text x="630" y="674" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">s³</text>
  <text x="630" y="690" text-anchor="middle" font-size="10" fill="#854F0B">head3 跨 Token 拼接</text>

  <text x="450" y="712" text-anchor="middle" font-size="10" fill="#5F5E5A">… 共 H = T 个 mixed Token，参数量为零，仅做张量重排</text>

  <!-- Add & Norm 1 -->
  <line x1="450" y1="720" x2="450" y2="732" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="330" y="734" width="240" height="42" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="450" y="752" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Add &amp; Norm</text>
  <text x="450" y="768" text-anchor="middle" font-size="10" fill="#5F5E5A">残差连接 + LayerNorm</text>

  <line x1="450" y1="776" x2="450" y2="796" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5b. Per-token FFN / SMoE box -->
  <rect x="90" y="798" width="720" height="188" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="450" y="822" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Per-token FFN（可选 Sparse-MoE）</text>
  <text x="450" y="840" text-anchor="middle" font-size="11" fill="#0F6E56">每个 Token 独立参数，输入与参数同时按 Token 切分</text>

  <g font-size="11" fill="#085041">
    <rect x="140" y="852" width="140" height="56" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
    <text x="210" y="876" text-anchor="middle" font-weight="600">FFN 1</text>
    <text x="210" y="892" text-anchor="middle" font-size="9">token1 独立参数</text>

    <rect x="300" y="852" width="140" height="56" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
    <text x="370" y="876" text-anchor="middle" font-weight="600">FFN 2</text>
    <text x="370" y="892" text-anchor="middle" font-size="9">token2 独立参数</text>

    <rect x="460" y="852" width="140" height="56" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
    <text x="530" y="876" text-anchor="middle" font-weight="600">FFN 3</text>
    <text x="530" y="892" text-anchor="middle" font-size="9">token3 独立参数</text>

    <text x="622" y="884" text-anchor="middle" font-size="16" font-weight="600">…</text>

    <rect x="640" y="852" width="140" height="56" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
    <text x="710" y="876" text-anchor="middle" font-weight="600">FFN T</text>
    <text x="710" y="892" text-anchor="middle" font-size="9">tokenT 独立参数</text>
  </g>

  <rect x="140" y="922" width="640" height="50" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="1"/>
  <text x="460" y="942" text-anchor="middle" font-size="11" font-weight="600" fill="#72243E">SMoE 变体：ReLU Routing（替代 Top-k + Softmax）</text>
  <text x="460" y="958" text-anchor="middle" font-size="10" fill="#993556">+ DTSI：双路由器（Dense-Training / Sparse-Inference）避免专家欠训练</text>

  <!-- Add & Norm 2 -->
  <line x1="450" y1="986" x2="450" y2="998" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="330" y="1000" width="240" height="42" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="450" y="1018" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Add &amp; Norm</text>
  <text x="450" y="1034" text-anchor="middle" font-size="10" fill="#5F5E5A">残差连接 + LayerNorm</text>

  <!-- ===== 6. after block: mean pooling ===== -->
  <line x1="450" y1="1060" x2="450" y2="1082" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="350" y="1084" width="200" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="450" y="1108" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">Mean Pooling</text>
  <text x="450" y="1124" text-anchor="middle" font-size="10" fill="#3C3489">最后一层 X_L 做均值池化</text>

  <line x1="450" y1="1130" x2="450" y2="1152" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- output tasks -->
  <g font-size="12" fill="#0C447C">
    <rect x="90"  y="1154" width="120" height="20" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
    <text x="150" y="1168" text-anchor="middle" font-weight="600">finish</text>

    <rect x="240" y="1154" width="120" height="20" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
    <text x="300" y="1168" text-anchor="middle" font-weight="600">skip</text>

    <rect x="390" y="1154" width="120" height="20" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
    <text x="450" y="1168" text-anchor="middle" font-weight="600">like</text>

    <rect x="540" y="1154" width="120" height="20" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
    <text x="600" y="1168" text-anchor="middle" font-weight="600">comment</text>

    <rect x="690" y="1154" width="120" height="20" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
    <text x="750" y="1168" text-anchor="middle" font-weight="600">… 其他任务</text>
  </g>
</svg>
