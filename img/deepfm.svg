<text x="360" y="90" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="500" fill="#263238">Sparse Input Features</text>
<text x="360" y="105" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#263238" opacity="0.75">field_1 … field_m</text>
