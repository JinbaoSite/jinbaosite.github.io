<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --text: #e0e0f0;
            --accent: #7c6ff7;
            --accent-glow: #a78bfa;
            --star-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ============ 星空画布 ============ */
        canvas#starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ============ 流星 ============ */
        .shooting-star {
            position: fixed;
            top: -10px;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.9) 40%,
                    rgba(200, 210, 255, 0.7) 70%,
                    rgba(120, 140, 255, 0) 100%);
            border-radius: 50%;
            transform: rotate(-35deg);
            animation: shoot linear forwards;
            z-index: 1;
            pointer-events: none;
            filter: blur(0.5px);
            box-shadow: 0 0 12px 3px rgba(180, 190, 255, 0.5);
        }
        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(-35deg);
                opacity: 1;
            }
            70% {
                opacity: 0.8;
            }
            100% {
                transform: translate(-800px, 900px) rotate(-35deg);
                opacity: 0;
            }
        }

        /* ============ 主容器 ============ */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            animation: fadeInUp 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 大月球 ============ */
        .moon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 0.5rem;
            animation: floatMoon 6s ease-in-out infinite;
        }
        @keyframes floatMoon {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-22px);
            }
            60% {
                transform: translateY(-8px);
            }
            85% {
                transform: translateY(-18px);
            }
        }
        .moon {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle at 55% 45%,
                    #f5f0e8 0%,
                    #e8dcc8 25%,
                    #d4c5a9 50%,
                    #b8a88a 75%,
                    #8c7d65 100%);
            border-radius: 50%;
            position: relative;
            box-shadow:
                0 0 60px 20px rgba(200, 190, 160, 0.25),
                0 0 120px 40px rgba(180, 160, 120, 0.12),
                0 0 200px 70px rgba(160, 140, 100, 0.06),
                inset -8px -4px 20px rgba(0, 0, 0, 0.3),
                inset 4px 4px 15px rgba(255, 255, 255, 0.2);
            margin: 0 auto;
        }
        /* 月球环形山 */
        .moon::before {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
            top: 30px;
            left: 28px;
            box-shadow:
                inset 2px 2px 4px rgba(255, 255, 255, 0.15),
                35px 18px 0 6px rgba(0, 0, 0, 0.1),
                10px 55px 0 4px rgba(0, 0, 0, 0.09),
                50px 50px 0 10px rgba(0, 0, 0, 0.07),
                -5px 42px 0 2px rgba(0, 0, 0, 0.06);
        }
        .moon::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: rgba(0, 0, 0, 0.12);
            border-radius: 50%;
            top: 62px;
            left: 55px;
            box-shadow:
                22px -8px 0 3px rgba(0, 0, 0, 0.08),
                -20px 15px 0 5px rgba(0, 0, 0, 0.09);
        }

        /* 环绕月球的轨道环 */
        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 190px;
            height: 190px;
            border: 1.5px dashed rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotateX(65deg);
            animation: orbitSpin 20s linear infinite;
            pointer-events: none;
        }
        @keyframes orbitSpin {
            from {
                transform: translate(-50%, -50%) rotateX(65deg) rotateZ(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotateX(65deg) rotateZ(360deg);
            }
        }
        .orbit-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 14px 4px rgba(200, 200, 240, 0.8);
            animation: dotPulse 2s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,
            100% {
                box-shadow: 0 0 14px 4px rgba(200, 200, 240, 0.8);
            }
            50% {
                box-shadow: 0 0 22px 8px rgba(220, 220, 255, 1);
            }
        }

        /* ============ 404 数字 ============ */
        .code {
            font-size: clamp(5rem, 12vw, 10rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            color: transparent;
            background: linear-gradient(180deg,
                    #e8e0f0 0%,
                    #c4b8e8 30%,
                    #9b8fd4 60%,
                    #6e5fc0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(140, 120, 220, 0.5));
            line-height: 1;
            margin-bottom: 0.1em;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%,
            100% {
                filter: drop-shadow(0 0 40px rgba(140, 120, 220, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 60px rgba(170, 150, 240, 0.8));
            }
        }

        /* ============ 标题 ============ */
        .title {
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            font-weight: 500;
            color: #c8c0e8;
            letter-spacing: 0.06em;
            margin-bottom: 0.6rem;
        }

        /* ============ 描述 ============ */
        .description {
            font-size: clamp(0.9rem, 1.5vw, 1.05rem);
            color: #9088b8;
            line-height: 1.7;
            max-width: 420px;
            margin: 0 auto 2rem;
            letter-spacing: 0.03em;
        }
        .description .highlight {
            color: #c4b8f0;
            font-weight: 500;
        }

        /* ============ 按钮 ============ */
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.6em;
            padding: 0.85em 2.2em;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: #e8e0f8;
            background: rgba(120, 100, 200, 0.25);
            border: 1.5px solid rgba(160, 140, 220, 0.5);
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 0 25px rgba(130, 110, 210, 0.2);
        }
        .btn-home::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: linear-gradient(135deg,
                    rgba(180, 150, 240, 0.3) 0%,
                    rgba(100, 80, 180, 0.15) 50%,
                    rgba(160, 130, 220, 0.25) 100%);
            opacity: 0;
            transition: opacity 0.35s;
        }
        .btn-home:hover {
            border-color: rgba(200, 180, 240, 0.8);
            box-shadow:
                0 0 40px rgba(150, 120, 230, 0.45),
                0 0 80px rgba(140, 110, 220, 0.2);
            transform: translateY(-3px);
            color: #ffffff;
        }
        .btn-home:hover::before {
            opacity: 1;
        }
        .btn-home:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }
        .btn-home .arrow {
            display: inline-block;
            transition: transform 0.3s;
            font-size: 1.1em;
        }
        .btn-home:hover .arrow {
            transform: translateX(5px);
        }
        .btn-text {
            position: relative;
            z-index: 1;
        }
        .btn-arrow-wrap {
            position: relative;
            z-index: 1;
        }

        /* ============ 底部提示 ============ */
        .footer-hint {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #5c5580;
            letter-spacing: 0.05em;
            animation: fadeInUp 1.2s 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        }
        .footer-hint span {
            animation: blink 1.5s step-end infinite;
            color: #9088c0;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }

        /* ============ 响应式 ============ */
        @media (max-width: 480px) {
            .moon {
                width: 100px;
                height: 100px;
            }
            .moon::before {
                width: 20px;
                height: 20px;
                top: 22px;
                left: 20px;
                box-shadow: 25px 12px 0 4px rgba(0, 0, 0, 0.1),
                    8px 38px 0 3px rgba(0, 0, 0, 0.09),
                    35px 35px 0 7px rgba(0, 0, 0, 0.07);
            }
            .moon::after {
                width: 13px;
                height: 13px;
                top: 45px;
                left: 38px;
                box-shadow: 15px -5px 0 2px rgba(0, 0, 0, 0.08);
            }
            .orbit-ring {
                width: 140px;
                height: 140px;
            }
            .btn-home {
                padding: 0.7em 1.6em;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- 星空画布 -->
    <canvas id="starfield"></canvas>

    <!-- 主内容 -->
    <div class="container">
        <!-- 月球 -->
        <div class="moon-wrapper">
            <div class="orbit-ring">
                <div class="orbit-dot"></div>
            </div>
            <div class="moon"></div>
        </div>

        <!-- 404 -->
        <div class="code">404</div>

        <!-- 标题 -->
        <p class="title">🌌 哎呀，你飘到太空深处了…</p>

        <!-- 描述 -->
        <p class="description">
            这个页面像一颗<span class="highlight">迷路的卫星</span>，
            已经脱离了轨道，<br>飘向了未知的星系。
            不如我们<span class="highlight">返回地球</span>吧？
        </p>

        <!-- 返回按钮 -->
        <a href="/" class="btn-home">
            <span class="btn-text">返回首页</span>
            <span class="btn-arrow-wrap">
                <span class="arrow">🚀</span>
            </span>
        </a>

        <!-- 底部 -->
        <p class="footer-hint">
            或按 <span>Esc</span> 发射信号弹…
        </p>
    </div>

    <script>
        (function() {
            // ==================== 星空背景 ====================
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];
            const STAR_COUNT = 200;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                initStars();
            });

            function initStars() {
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        r: Math.random() * 1.8 + 0.3,
                        twinkleSpeed: Math.random() * 0.02 + 0.005,
                        twinkleOffset: Math.random() * Math.PI * 2,
                        baseAlpha: Math.random() * 0.6 + 0.4,
                        driftX: (Math.random() - 0.5) * 0.15,
                        driftY: (Math.random() - 0.5) * 0.08,
                    });
                }
            }
            initStars();

            function drawStars(timestamp) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 微弱的整体辉光
                const centerGlow = ctx.createRadialGradient(
                    canvas.width / 2, canvas.height / 2, canvas.width * 0.2,
                    canvas.width / 2, canvas.height / 2, canvas.width * 0.75
                );
                centerGlow.addColorStop(0, 'rgba(40,30,80,0.25)');
                centerGlow.addColorStop(0.5, 'rgba(20,15,50,0.08)');
                centerGlow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = centerGlow;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                stars.forEach(star => {
                    const alpha = star.baseAlpha + Math.sin(timestamp * star.twinkleSpeed + star
                        .twinkleOffset) * 0.35;
                    const clampedAlpha = Math.max(0.15, Math.min(1, alpha));

                    // 星点光晕
                    const glow = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.r * 4);
                    glow.addColorStop(0, `rgba(220,210,255,${clampedAlpha})`);
                    glow.addColorStop(0.4, `rgba(180,160,230,${clampedAlpha * 0.5})`);
                    glow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.r * 4, 0, Math.PI * 2);
                    ctx.fillStyle = glow;
                    ctx.fill();

                    // 星点核心
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${clampedAlpha})`;
                    ctx.fill();

                    // 缓慢漂移
                    star.x += star.driftX;
                    star.y += star.driftY;
                    if (star.x < -10) star.x = canvas.width + 10;
                    if (star.x > canvas.width + 10) star.x = -10;
                    if (star.y < -10) star.y = canvas.height + 10;
                    if (star.y > canvas.height + 10) star.y = -10;
                });
            }

            // ==================== 流星 ====================
            function spawnShootingStar() {
                const star = document.createElement('div');
                star.classList.add('shooting-star');
                star.style.left = Math.random() * 70 + 5 + '%';
                star.style.top = -(Math.random() * 40 + 10) + 'px';
                star.style.animationDuration = (Math.random() * 1.5 + 1.2) + 's';
                star.style.width = (Math.random() * 2 + 1.5) + 'px';
                star.style.height = (Math.random() * 60 + 40) + 'px';
                document.body.appendChild(star);

                star.addEventListener('animationend', () => {
                    star.remove();
                });
            }
            // 随机流星
            function scheduleMeteor() {
                const delay = Math.random() * 8000 + 3000;
                setTimeout(() => {
                    if (document.hidden) {
                        scheduleMeteor();
                        return;
                    }
                    spawnShootingStar();
                    scheduleMeteor();
                }, delay);
            }
            scheduleMeteor();
            // 初始来一发
            setTimeout(spawnShootingStar, 1200);

            // ==================== 动画循环 ====================
            function animate(timestamp) {
                drawStars(timestamp);
                requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);

            // ==================== ESC 键交互 ====================
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    spawnShootingStar();
                    spawnShootingStar();
                    // 小震动反馈
                    const container = document.querySelector('.container');
                    container.style.transition = 'transform 0.08s';
                    container.style.transform = 'translateY(-4px)';
                    setTimeout(() => {
                        container.style.transform = 'translateY(0)';
                        setTimeout(() => {
                            container.style.transition =
                                'transform 0.6s cubic-bezier(0.22, 0.61, 0.36, 1)';
                        }, 120);
                    }, 80);
                }
            });

            // ==================== 鼠标移动视差 ====================
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 20;
                const y = (e.clientY / window.innerHeight - 0.5) * 20;
                const moonWrapper = document.querySelector('.moon-wrapper');
                const code = document.querySelector('.code');
                if (moonWrapper) {
                    moonWrapper.style.transform =
                        `translate(${x * 0.4}px, ${y * 0.4}px)`;
                }
                if (code) {
                    code.style.transform =
                        `translate(${x * 0.25}px, ${y * 0.25}px)`;
                }
            });

            console.log('%c🌙 你发现了隐藏的月球基地。404不是终点，是探索的起点。',
                'color: #c4b8e8; font-size: 1.1em;');
        })();
    </script>
</body>
</html>
