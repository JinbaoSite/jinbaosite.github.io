<header>
    <div class="header-left">
      <a href="/" class="logo">
        <div class="logo-icon">J</div>
        <span>Jinbao</span>
      </a>
    </div>
    <nav>
      {% for menus in site.menus %}
      <a href="{{ menus.url }}">{{ menus.title }}</a>
      {% endfor %}
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="mobile-nav" id="mobileNav">
    {% for menus in site.data.menus %}
    <a href="{{ menus.url }}" class="active">{{ menus.title }}</a>
    {% endfor %}
  </div>
